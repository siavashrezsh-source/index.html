<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comment Moderator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1a1a18;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 0.5px solid rgba(0,0,0,0.12);
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #73726c;
      margin-bottom: 32px;
    }

    label.field-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #5f5e5a;
      margin-bottom: 8px;
    }

    .webhook-input {
      width: 100%;
      padding: 10px 14px;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a18;
      background: #fff;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.15s;
    }

    .webhook-input:focus {
      border-color: rgba(0,0,0,0.4);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }

    .drop-zone {
      border: 1.5px dashed rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 20px;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #378ADD;
      background: #E6F1FB;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 32px;
      margin-bottom: 10px;
      color: #888780;
    }

    .drop-text {
      font-size: 14px;
      color: #5f5e5a;
    }

    .drop-text strong {
      color: #185FA5;
      font-weight: 500;
    }

    .file-name {
      font-size: 13px;
      color: #3B6D11;
      margin-top: 8px;
      font-weight: 500;
      display: none;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #1a1a18;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .status-box {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      align-items: flex-start;
      gap: 10px;
    }

    .status-box.processing {
      background: #E6F1FB;
      color: #0C447C;
      display: flex;
    }

    .status-box.success {
      background: #EAF3DE;
      color: #27500A;
      display: flex;
    }

    .status-box.error {
      background: #FCEBEB;
      color: #791F1F;
      display: flex;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(12,68,124,0.3);
      border-top-color: #0C447C;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
      margin-top: 1px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .download-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #27500A;
      color: #fff;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }

    .download-btn:hover { opacity: 0.85; }

    .format-hint {
      font-size: 12px;
      color: #888780;
      margin-top: 20px;
      line-height: 1.6;
    }

    .format-hint code {
      background: #f1efe8;
      padding: 1px 5px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Comment Moderator</h1>
    <p class="subtitle">Upload a CSV file to check comments with Claude AI</p>

    <label class="field-label" for="webhook-url">n8n Webhook URL</label>
    <input
      class="webhook-input"
      type="text"
      id="webhook-url"
      placeholder="https://your-n8n.com/webhook/comment-moderation"
    />

    <label class="field-label">CSV File</label>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".csv" />
      <div class="drop-icon">&#8679;</div>
      <div class="drop-text"><strong>Click to upload</strong> or drag and drop</div>
      <div class="drop-text" style="margin-top:4px; font-size:12px;">CSV files only</div>
      <div class="file-name" id="file-name"></div>
    </div>

    <button class="btn" id="upload-btn" disabled onclick="uploadFile()">
      Upload &amp; Moderate
    </button>

    <div class="status-box" id="status-box">
      <div class="spinner" id="spinner"></div>
      <div id="status-text"></div>
    </div>

    <p class="format-hint">
      CSV must have a <code>comment</code> column. Optional: <code>id</code>, <code>username</code>.
      Output will include <code>status</code> (approved/rejected) and <code>reason</code> columns.
    </p>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const fileName = document.getElementById('file-name');
    const uploadBtn = document.getElementById('upload-btn');
    const statusBox = document.getElementById('status-box');
    const statusText = document.getElementById('status-text');
    const spinner = document.getElementById('spinner');

    let selectedFile = null;

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.csv')) {
        setFile(file);
      } else {
        showStatus('error', 'Please upload a CSV file.');
      }
    });

    function setFile(file) {
      selectedFile = file;
      fileName.textContent = file.name;
      fileName.style.display = 'block';
      checkReady();
    }

    document.getElementById('webhook-url').addEventListener('input', checkReady);

    function checkReady() {
      const url = document.getElementById('webhook-url').value.trim();
      uploadBtn.disabled = !(selectedFile && url);
    }

    function showStatus(type, message, extra) {
      statusBox.className = 'status-box ' + type;
      spinner.style.display = type === 'processing' ? 'block' : 'none';
      statusText.innerHTML = message + (extra || '');
    }

    async function uploadFile() {
      const url = document.getElementById('webhook-url').value.trim();
      if (!url || !selectedFile) return;

      uploadBtn.disabled = true;
      showStatus('processing', 'Uploading and processing comments...<br><small style="opacity:0.7">This may take a moment depending on file size.</small>');

      try {
        const formData = new FormData();
        formData.append('file', selectedFile);

        const response = await fetch(url, {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          throw new Error('Server returned ' + response.status + ' — check your webhook URL and make sure the workflow is active.');
        }

        const blob = await response.blob();
        const downloadUrl = URL.createObjectURL(blob);

        showStatus('success',
          '<strong>Done!</strong> Your moderated CSV is ready.',
          `<br><button class="download-btn" onclick="triggerDownload('${downloadUrl}')">Download moderated_comments.csv</button>`
        );
      } catch (err) {
        showStatus('error', '<strong>Error:</strong> ' + err.message);
      } finally {
        uploadBtn.disabled = false;
        checkReady();
      }
    }

    function triggerDownload(url) {
      const a = document.createElement('a');
      a.href = url;
      a.download = 'moderated_comments.csv';
      a.click();
    }
  </script>
</body>
</html>
